<style>
:root {
  --navy:#0f1f3d;--navy-mid:#1b3468;--navy-light:#2a4a8a;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;padding-bottom:calc(80px + var(--safe-bottom))}
.app-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);padding:calc(16px + var(--safe-top)) 20px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(15,31,61,.3)}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.header-title h1{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1.2;letter-spacing:-.3px}
.header-title p{font-size:11px;color:rgba(255,255,255,.55);margin-top:3px;font-weight:300;letter-spacing:.5px;text-transform:uppercase}
.sync-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 10px;font-size:10px;color:rgba(255,255,255,.7);cursor:pointer;transition:background .2s;white-space:nowrap}
.sync-badge:hover{background:rgba(255,255,255,.18)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#4ade80}
.sync-dot.syncing{background:var(--gold-light);animation:pulse 1s infinite}
.sync-dot.error{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.progress-strip{display:grid;grid-template-columns:repeat(4,1fr)}
.prog-stat{padding:10px 0 12px;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
.prog-stat:last-child{border-right:none}
.prog-num{font-family:'DM Serif Display',serif;font-size:22px;color:#fff;line-height:1}
.prog-label{font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.6px;margin-top:3px}
.prog-bar-wrap{height:3px;background:rgba(255,255,255,.15)}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .5s ease}
.filter-wrap{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;overflow-x:auto;scrollbar-width:none;display:flex;gap:7px;-webkit-overflow-scrolling:touch}
.filter-wrap::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
.pill:hover{border-color:var(--navy-light);color:var(--navy)}
.pill.active{background:var(--navy);border-color:var(--navy);color:#fff}
.pill-count{background:rgba(255,255,255,.2);border-radius:10px;padding:1px 6px;font-size:10px}
.pill:not(.active) .pill-count{background:var(--surface);color:var(--muted)}
.content{padding:16px;max-width:680px;margin:0 auto}
.phase-block{margin-bottom:12px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.phase-header{display:flex;align-items:center;padding:13px 16px;cursor:pointer;user-select:none;gap:11px;transition:filter .15s}
.phase-header:active{filter:brightness(.92)}
.phase-num{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:14px;color:#fff;flex-shrink:0}
.phase-meta{flex:1;min-width:0}
.phase-title{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.phase-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px}
.phase-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.phase-prog-text{font-size:11px;color:rgba(255,255,255,.7)}
.phase-chevron{font-size:16px;color:rgba(255,255,255,.6);transition:transform .25s}
.phase-chevron.open{transform:rotate(180deg)}
.phase-mini-bar{height:2px}
.phase-mini-fill{height:100%;transition:width .4s}
.task-list{background:var(--card)}
.task-list.hidden{display:none}
.task-row{display:flex;align-items:flex-start;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;gap:12px}
.task-row:last-child{border-bottom:none}
.task-row:active{background:var(--surface)}
.task-row.done{opacity:.5}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--card)}
.task-check.checked{background:var(--green);border-color:var(--green)}

.task-body{flex:1;min-width:0}
.task-title{font-size:13.5px;font-weight:500;color:var(--text);line-height:1.4}
.task-row.done .task-title{text-decoration:line-through;color:var(--muted)}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px}
.tag-Required{background:#fee2e2;color:#991b1b}
.tag-Career{background:#dbeafe;color:#1e40af}
.tag-Financial{background:#fef3c7;color:#92400e}
.tag-Medical{background:#dcfce7;color:#166534}
.tag-Admin{background:#ede9fe;color:#5b21b6}
.task-date{font-size:10px;color:var(--muted)}
.task-note-toggle{font-size:10px;color:var(--navy-light);margin-top:4px;display:inline-flex;align-items:center;gap:3px}
.task-note{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;padding:8px 10px;background:var(--surface);border-radius:8px;border-left:3px solid var(--border);display:none}
.task-note.visible{display:block}
.task-status-btn{flex-shrink:0;padding:4px 9px;border-radius:8px;font-size:10px;font-weight:600;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap;margin-top:1px}
.status-Not-Started{background:var(--surface);color:var(--muted);border:1.5px solid var(--border)}
.status-In-Progress{background:var(--amber-bg);color:var(--amber);border:1.5px solid #fcd34d}
.status-Complete{background:var(--green-bg);color:var(--green);border:1.5px solid #86efac}
.status-On-Hold{background:#fce7f3;color:#9d174d;border:1.5px solid #fbcfe8}
.status-Deferred{background:#f1f5f9;color:#475569;border:1.5px solid #cbd5e1}
.status-menu{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-radius:20px 20px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.2);z-index:200;padding:0 0 calc(20px + var(--safe-bottom));transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.status-menu.open{transform:translateY(0)}
.status-menu-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.status-menu-title{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:14px 20px 10px;font-weight:600}
.status-option{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;transition:background .1s;border-top:1px solid var(--border)}
.status-option:active{background:var(--surface)}
.status-option-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-option-label{font-size:15px;font-weight:500}
.status-option-check{margin-left:auto;color:var(--green);font-size:16px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;display:none}
.overlay.open{display:block}
.empty-state{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-state .emoji{font-size:40px;margin-bottom:12px}
.loading-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s}
.loading-screen.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'DM Serif Display',serif;font-size:28px;color:#fff;margin-bottom:8px}
.loading-sub{font-size:12px;color:rgba(255,255,255,.4);letter-spacing:1px;text-transform:uppercase;margin-bottom:32px}
.loading-spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--gold-light);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(24px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;transition:transform .3s;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

const STATUS_OPTIONS=[
  {value:'Not Started',color:'#9ca3af'},{value:'In Progress',color:'#f59e0b'},
  {value:'Complete',color:'#22c55e'},{value:'On Hold',color:'#ec4899'},{value:'Deferred',color:'#94a3b8'}
];
const CATEGORIES=['All','Required','Career','Financial','Medical','Admin'];
let statuses={},phaseOpen={},activeFilter='All',pendingTaskId=null,noteVisible={};

const api2=(path,opts={})=>fetch(`${SUPABASE_URL}/rest/v1/${path}`,{
  headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal',...(opts.headers||{})},
  method:opts.method||'GET',body:opts.body
});

async function loadFromSupabase(){
  try{
    const r=await api2('progress?select=id,status');
    if(!r.ok)throw new Error();
    const rows=await r.json();
    rows.forEach(row=>{statuses[row.id]=row.status;});
    setSyncState('synced');
  }catch(e){setSyncState('error');}
}

async function saveStatus(taskId,status){
  setSyncState('syncing');
  try{
    const r=await api2('progress',{
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({id:taskId,status,updated_at:new Date().toISOString()})
    });
    if(!r.ok)throw new Error();
    setSyncState('synced');
    showToast(status==='Complete'?'✓ Marked complete':'Status updated');
  }catch(e){
    setSyncState('error');
    showToast('Sync failed — try again');
  }
}

function setSyncState(s){
  const dot=document.getElementById('syncDot'),lbl=document.getElementById('syncLabel');
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  lbl.textContent=s==='syncing'?'Syncing…':s==='error'?'Offline':'Synced';
}

async function syncNow(){
  setSyncState('syncing');
  await loadFromSupabase();
  render();
  showToast('Progress synced ✓');
}

function getStatus(id){return statuses[id]||'Not Started';}
function statusClass(s){return 'status-'+s.replace(/ /g,'-');}

function updateHeader(){
  const tasks=activeFilter==='All'?TASKS:TASKS.filter(t=>t.cat===activeFilter);
  const total=tasks.length;
  const done=tasks.filter(t=>getStatus(t.id)==='Complete').length;
  const active=tasks.filter(t=>getStatus(t.id)==='In Progress').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statActive').textContent=active;
  document.getElementById('statPct').textContent=pct+'%';
  document.getElementById('progBar').style.width=pct+'%';
}

function renderFilters(){
  const wrap=document.getElementById('filterWrap');
  wrap.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const count=cat==='All'?TASKS.length:TASKS.filter(t=>t.cat===cat).length;
    const btn=document.createElement('button');
    btn.className='pill'+(cat===activeFilter?' active':'');
    btn.innerHTML=`${cat} <span class="pill-count">${count}</span>`;
    btn.onclick=()=>{activeFilter=cat;render();};
    wrap.appendChild(btn);
  });
}

function render(){
  renderFilters();
  updateHeader();
  const content=document.getElementById('mainContent');
  content.innerHTML='';
  const filtered=activeFilter==='All'?TASKS:TASKS.filter(t=>t.cat===activeFilter);
  let any=false;
  PHASES.forEach(phase=>{
    const pts=filtered.filter(t=>t.phase===phase.id);
    if(!pts.length)return;
    any=true;
    const isOpen=phaseOpen[phase.id]!==false;
    const done=pts.filter(t=>getStatus(t.id)==='Complete').length;
    const pct=pts.length?Math.round(done/pts.length*100):0;
    const block=document.createElement('div');
    block.className='phase-block';
    const hdr=document.createElement('div');
    hdr.className='phase-header';
    hdr.style.background=`linear-gradient(135deg,${phase.color},${phase.color}dd)`;
    hdr.innerHTML=`<div class="phase-num">${phase.id}</div><div class="phase-meta"><div class="phase-title">${phase.title}</div><div class="phase-sub">${phase.sub}</div></div><div class="phase-right"><span class="phase-prog-text">${done}/${pts.length}</span><span class="phase-chevron ${isOpen?'open':''}">▾</span></div>`;
    hdr.onclick=()=>{phaseOpen[phase.id]=!isOpen;render();};
    const miniBar=document.createElement('div');
    miniBar.className='phase-mini-bar';
    miniBar.style.background=phase.color+'33';
    miniBar.innerHTML=`<div class="phase-mini-fill" style="width:${pct}%;background:rgba(255,255,255,0.5)"></div>`;
    const list=document.createElement('div');
    list.className='task-list'+(isOpen?'':' hidden');
    pts.forEach(task=>{
      const status=getStatus(task.id);
      const isDone=status==='Complete';
      const row=document.createElement('div');
      row.className='task-row'+(isDone?' done':'');
      const chk=document.createElement('div');
      chk.className='task-check'+(isDone?' checked':'');
      chk.onclick=(e)=>{
        e.stopPropagation();
        const ns=isDone?'Not Started':'Complete';
        statuses[task.id]=ns;
        saveStatus(task.id,ns);
        render();
      };
      const body=document.createElement('div');
      body.className='task-body';
      const nv=noteVisible[task.id];
      body.innerHTML=`<div class="task-title">${task.title}</div><div class="task-meta"><span class="tag tag-${task.cat}">${task.cat}</span><span class="task-date">📅 ${task.date}</span></div>${task.note?`<div class="task-note-toggle" id="ntog-${task.id}">${nv?'▴ Hide note':'▾ Show note'}</div><div class="task-note${nv?' visible':''}" id="note-${task.id}">${task.note}</div>`:''}`;
      if(task.note){
        body.querySelector(`#ntog-${task.id}`).onclick=(e)=>{
          e.stopPropagation();
          noteVisible[task.id]=!nv;
          render();
        };
      }
      const btn=document.createElement('button');
      btn.className=`task-status-btn ${statusClass(status)}`;
      btn.textContent=status;
      btn.onclick=(e)=>{e.stopPropagation();openStatusMenu(task.id);};
      row.appendChild(chk);row.appendChild(body);row.appendChild(btn);
      list.appendChild(row);
    });
    block.appendChild(hdr);block.appendChild(miniBar);block.appendChild(list);
    content.appendChild(block);
  });
  if(!any)content.innerHTML='<div class="empty-state"><div class="emoji">🔍</div><p>No items in this category</p></div>';
}

function openStatusMenu(taskId){
  pendingTaskId=taskId;
  const current=getStatus(taskId);
  const opts=document.getElementById('statusOptions');
  opts.innerHTML='';
  STATUS_OPTIONS.forEach(opt=>{
    const div=document.createElement('div');
    div.className='status-option';
    div.innerHTML=`<div class="status-option-dot" style="background:${opt.color}"></div><span class="status-option-label">${opt.value}</span>${opt.value===current?'<span class="status-option-check">✓</span>':''}`;
    div.onclick=()=>{statuses[taskId]=opt.value;saveStatus(taskId,opt.value);closeStatusMenu();render();};
    opts.appendChild(div);
  });
  document.getElementById('statusMenu').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeStatusMenu(){
  document.getElementById('statusMenu').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

async function init(){
  PHASES.forEach(p=>{phaseOpen[p.id]=true;});
  await loadFromSupabase();
  render();
  const ls=document.getElementById('loadingScreen');
  ls.classList.add('hidden');
  setTimeout(()=>ls.remove(),500);
}

init();
</script>
</body>
